services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: controle
      POSTGRES_PASSWORD: controle
      POSTGRES_DB: controle_financiamentos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U controle -d controle_financiamentos']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/backends/controle-financiamentos-api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://controle:controle@postgres:5432/controle_financiamentos
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      CORS_ORIGIN: http://localhost:8080
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/frontends/controle-financiamentos-web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - '8080:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
